name: Build ESP32 (ESP-IDF v4.1)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Lấy code từ repo
    - name: Checkout
      uses: actions/checkout@v3

    # ⚠️ Fix Python cho ESP-IDF 4.1
    - name: Setup Python 3.8
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    # Cài ESP-IDF đúng version
    - name: Setup ESP-IDF v4.1
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v4.1

    # Build firmware
    - name: Build project
      run: |
        . $IDF_PATH/export.sh
        idf.py build

    # Upload file .bin để tải về
    - name: Upload firmware
      uses: actions/upload-artifact@v3
      with:
        name: firmware
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/*.bin
