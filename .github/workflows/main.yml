name: Build ESP32 (ESP-IDF v4.1)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Lấy code
    - name: Checkout
      uses: actions/checkout@v4

    # Dùng ESP-IDF 4.1 (đã có sẵn môi trường, không cần export.sh)
    - name: Setup ESP-IDF v4.1
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v4.1

    # Build (⚠️ KHÔNG dùng export.sh nữa)
    - name: Build project
      run: idf.py build

    # Upload firmware (.bin)
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/*.bin
